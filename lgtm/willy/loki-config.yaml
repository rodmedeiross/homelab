# Override of the otel-lgtm bundled loki-config.yaml.
# The bundled config ships WITHOUT compactor/limits_config, so Loki retention is
# infinite (this is what grew /srv/infra/lgtm/data/loki to 10G). We add the
# compactor + limits below to actually expire old chunks.
# Mounted at /otel-lgtm/loki-config.yaml. Keep the rest in sync with upstream:
# https://github.com/grafana/docker-otel-lgtm/blob/main/docker/loki-config.yaml
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /data/loki
  storage:
    filesystem:
      chunks_directory: /data/loki/chunks
      rules_directory: /data/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://127.0.0.1:9093

pattern_ingester:
  lifecycler:
    min_ready_duration: 1s

ingester:
  lifecycler:
    min_ready_duration: 1s

frontend:
  scheduler_dns_lookup_period: 1s
  address: 127.0.0.1

query_scheduler:
  use_scheduler_ring: false

# --- retention (added on top of the bundled config) ---
# v13 schema retention requires the compactor with retention enabled AND a
# delete_request_store; retention_period alone does nothing.
compactor:
  working_directory: /data/loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

limits_config:
  retention_period: 720h # 30 days
