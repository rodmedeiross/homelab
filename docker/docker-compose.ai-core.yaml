name: ai-core

networks:
  ai_net:
    name: ai_net
    driver: bridge

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
    ports:
      - "11434:11434" # Ollama HTTP API (restrict in firewall if preferred)
    volumes:
      - /srv/ai/ollama:/root/.ollama:rw
    networks: [ai_net]
    labels:
      - com.centurylinklabs.watchtower.enable=true

  comfyui:
    image: comfyui-blackwell:cu128
    build:
      context: ./comfyui
    container_name: comfyui
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - WEB_ENABLE_AUTH=false
      - CF_QUICK_TUNNELS=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
    ports:
      - "8188:8188" # ComfyUI web UI
    volumes:
      - /srv/ai/comfyui/models:/opt/ComfyUI/models:rw
      - /srv/ai/comfyui/custom_nodes:/opt/ComfyUI/custom_nodes:rw
      - /srv/ai/comfyui/output:/opt/ComfyUI/output:rw
      - /srv/ai/comfyui/user:/opt/ComfyUI/user:rw
    networks: [ai_net]
    labels:
      - com.centurylinklabs.watchtower.enable=true

  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: speaches
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - WHISPER__MODEL=${SPEACHES_MODEL:-Systran/faster-whisper-large-v3}
      - WHISPER__COMPUTE_TYPE=${SPEACHES_COMPUTE:-float16}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
    ports:
      - "8001:8000" # OpenAI-compatible STT/TTS API
    volumes:
      - /srv/ai/speaches:/home/ubuntu/.cache/huggingface:rw
    networks: [ai_net]
    labels:
      - com.centurylinklabs.watchtower.enable=true

  litellm:
    image: ghcr.io/berriai/litellm-database:main-stable
    container_name: litellm
    restart: unless-stopped
    command:
      [
        "--config",
        "/etc/litellm/config.yaml",
        "--port",
        "4000",
        "--num_workers",
        "4",
      ]
    ports:
      - "4000:4000" # OpenAI-compatible proxy
    volumes:
      - /srv/ai/litellm:/etc/litellm:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@10.10.1.20:5433/litellm
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LITELLM_LOG=INFO
    depends_on:
      - ollama
    networks: [ai_net]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:4000/health/liveliness'', timeout=3)" || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=false # pinned via main-stable tag

  honcho-api:
    image: ghcr.io/plastic-labs/honcho:latest
    container_name: honcho-api
    restart: unless-stopped
    # Custom entrypoint: run migrations → align pgvector dim → start API
    # configure_embeddings.py is idempotent (no-op when schema matches)
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "Running database migrations..."
        /app/.venv/bin/python scripts/provision_db.py
        echo "Aligning pgvector dimensions to EMBEDDING_VECTOR_DIMENSIONS..."
        /app/.venv/bin/python scripts/configure_embeddings.py --yes
        echo "Starting API server..."
        exec /app/.venv/bin/fastapi run --host 0.0.0.0 src/main.py
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@10.10.1.20:5433/${HONCHO_DB:-honcho}
      - CACHE_URL=redis://:${REDIS_PASSWORD_URLENCODED}@10.10.1.20:6379/0
      - CACHE_ENABLED=true
      - AUTH_USE_AUTH=true
      - AUTH_JWT_SECRET=${HONCHO_JWT_SECRET}
      # LLM provider — point to local LiteLLM instead of OpenAI
      - LLM_OPENAI_BASE_URL=http://litellm:4000/v1
      - LLM_OPENAI_API_KEY=${HONCHO_DERIVER_KEY}
      # Embeddings — route via LiteLLM to local nomic-embed-text (768d)
      - EMBEDDING_MODEL_CONFIG__TRANSPORT=openai
      - EMBEDDING_MODEL_CONFIG__MODEL=local-embed
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL=http://litellm:4000/v1
      - EMBEDDING_VECTOR_DIMENSIONS=768
      # Dialectic — peer.chat() reasoning, all 5 levels use local-smart
      - DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__MODEL=local-smart
      - DIALECTIC_LEVELS__LOW__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__LOW__MODEL_CONFIG__MODEL=local-smart
      - DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__MODEL=local-smart
      - DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__MODEL=local-smart
      - DIALECTIC_LEVELS__MAX__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__MAX__MODEL_CONFIG__MODEL=local-smart
      # Summary — session/long summary generation
      - SUMMARY_MODEL_CONFIG__TRANSPORT=openai
      - SUMMARY_MODEL_CONFIG__MODEL=local-smart
    networks: [ai_net]
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - com.centurylinklabs.watchtower.enable=true

  honcho-deriver:
    image: ghcr.io/plastic-labs/honcho:latest
    container_name: honcho-deriver
    restart: unless-stopped
    command: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho-api:
        condition: service_healthy
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@10.10.1.20:5433/${HONCHO_DB:-honcho}
      - CACHE_URL=redis://:${REDIS_PASSWORD_URLENCODED}@10.10.1.20:6379/0
      - CACHE_ENABLED=true
      - AUTH_USE_AUTH=true
      - AUTH_JWT_SECRET=${HONCHO_JWT_SECRET}
      # LLM provider — point to local LiteLLM and use local model
      - LLM_OPENAI_BASE_URL=http://litellm:4000/v1
      - LLM_OPENAI_API_KEY=${HONCHO_DERIVER_KEY}
      - DERIVER_MODEL_CONFIG__TRANSPORT=openai
      - DERIVER_MODEL_CONFIG__MODEL=local-deriver
      # Embeddings — route via LiteLLM to local nomic-embed-text (768d)
      - EMBEDDING_MODEL_CONFIG__TRANSPORT=openai
      - EMBEDDING_MODEL_CONFIG__MODEL=local-embed
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL=http://litellm:4000/v1
      - EMBEDDING_VECTOR_DIMENSIONS=768
    networks: [ai_net]
    labels:
      - com.centurylinklabs.watchtower.enable=true
