name: ai-client

networks:
  proxy:
    external: true

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - /srv/ai/openwebui/data:/app/backend/data:rw
    networks: [proxy]
    labels:
      - com.centurylinklabs.watchtower.enable=true

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    user: "1000:1000"
    environment:
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: ${GENERIC_TIMEZONE}
      EXECUTIONS_MODE: queue
      N8N_HOST: ${N8N_HOST:-n8n.local}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: false
      N8N_RUNNERS_ENABLED: true
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN:-your-secret-here}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_NATIVE_PYTHON_RUNNER: true
      N8N_METRICS: true
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_PROXY_HOPS: 1
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_HOST: ${POSTGRES_HOST}
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_SCHEMA: public
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: ${REDIS_HOST}
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - /srv/n8n:/home/node/.n8n:rw
    networks: [proxy]
    labels:
      - com.centurylinklabs.watchtower.enable=true

  n8n-task-runners:
    image: n8nio/runners:latest
    container_name: n8n-runners
    restart: unless-stopped
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN:-your-secret-here}
    depends_on:
      - n8n
    networks: [proxy]
    labels:
      - com.centurylinklabs.watchtower.enable=true

  mcp-gateway:
    image: docker/mcp-gateway:latest
    container_name: mcp-gateway
    restart: unless-stopped
    command:
      - --transport=streaming
      - --port=8811
      - --catalog=/mcp/catalog.yaml
      - --config=/mcp/config.yaml
      - --registry=/mcp/registry.yaml
      - --tools-config=/mcp/tools.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /srv/ai/mcp-gateway/config:/mcp:rw
    ports:
      - "8811:8811"
    networks: [proxy]
    labels:
      - com.centurylinklabs.watchtower.enable=true
