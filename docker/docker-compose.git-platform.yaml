name: git-platform

services:
  gitlab:
    image: gitlab/gitlab-ee:latest
    container_name: gitlab
    restart: always
    shm_size: "1g"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://git.seu-dominio.com'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        letsencrypt['enable'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
    ports:
      - "8080:80"
      - "2222:22"
    volumes:
      - /srv/platform/gitlab/config:/etc/gitlab
      - /srv/platform/gitlab/logs:/var/log/gitlab
      - /srv/platform/gitlab/data:/var/opt/gitlab
    labels:
      - com.centurylinklabs.watchtower.enable=true
