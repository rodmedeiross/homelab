version: 2
name: homelab
displayName: Homelab MCP Catalog
registry:
  honcho:
    description: Self-hosted Honcho memory & personalization for rodmedeiross.
    title: Honcho Memory
    type: remote
    ref: ""
    remote:
      transport_type: streamable-http
      url: http://honcho-mcp:8787
      # The gateway injects these so clients never carry
      # the Honcho admin JWT. ${HONCHO_API_KEY} is resolved from secrets.env.
      headers:
        Authorization: "Bearer ${HONCHO_API_KEY}"
        X-Honcho-User-Name: "rodmedeiross"
        X-Honcho-Workspace-ID: "personal"
    # Declares the secret so the gateway resolves ${HONCHO_API_KEY} in the header.
    # The `name` (honcho.api_key) is the key in secrets.env; `env` is the ${var}.
    secrets:
      - name: honcho.api_key
        env: HONCHO_API_KEY
    tools: []
