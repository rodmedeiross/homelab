# LiteLLM proxy — minimal config
#
# Models, virtual keys, budgets, fallbacks and users are managed via UI:
#   http://10.10.1.20:4000/ui
#
# Everything persists in the `litellm` database inside pgvector
# (volume /srv/data/pgvector). This file holds only what must be
# available before the database comes up: cache, callbacks, global
# settings and UI bootstrap.

litellm_settings:
  # Response cache in Redis (shared with honcho)
  cache: true
  cache_params:
    type: redis
    host: 10.10.1.20
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 3600
  drop_params: true
  json_logs: true
  # Prometheus metrics at /metrics (scraped by Alloy)
  callbacks: ["prometheus"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
  # UI credentials are read directly from env vars UI_USERNAME / UI_PASSWORD
  # by LiteLLM (config.yaml doesn't support os.environ/ for these fields)
  # Models live in the database → edit via UI without rebuild
  store_model_in_db: true
  # Log prompt/response in spend log for debugging (disable if sensitive)
  store_prompts_in_spend_logs: true
